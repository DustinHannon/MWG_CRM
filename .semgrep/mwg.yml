rules:
  # Phase 20 — MWG CRM custom Semgrep rules.
  # Run via: pnpm security:semgrep
  # Local Windows note: native Semgrep does not support Windows. The
  # script invokes `python -m semgrep`; install once via
  # `pip install semgrep`. CI runners (Linux) need no extra steps.

  # ---- Marketing surface defense in depth ----------------------------
  - id: mwg-dangerouslysetinnerhtml-marketing
    message: |
      `dangerouslySetInnerHTML` in the marketing surface must render via
      a sandboxed iframe (srcdoc) — see STANDARDS §marketing for the
      pattern. Marketing rendered HTML is attacker-controllable (template
      bodies, merge-tag substitutions); rendering it directly into the
      admin DOM is stored XSS into the admin session.
    severity: ERROR
    languages: [typescript]
    pattern: dangerouslySetInnerHTML={...}
    paths:
      include:
        - "src/app/(app)/marketing/**"
        - "src/components/marketing/**"
        - "src/app/marketing/**"

  # ---- SQL injection class — Drizzle identifier --------------------
  # CVE-2026-39356 surface. Drizzle is patched at 0.45.2+, but defense
  # in depth requires the application to NEVER pass a non-literal
  # column/table name to `sql.identifier()` or `.as()`. Marketing
  # surface only — `concurrent-update.ts` uses Drizzle column names from
  # caller patches (Zod-validated, TS-typed) and is excluded.
  - id: mwg-sql-identifier-non-literal-marketing
    message: |
      `sql.identifier()` and `.as()` must take a string literal in the
      marketing surface. Use a column-name allowlist registry — see
      STANDARDS §filter-dsl for the pattern.
    severity: ERROR
    languages: [typescript]
    patterns:
      - pattern-either:
          - pattern: sql.identifier($X)
          - pattern: $A.as($X)
      - pattern-not: sql.identifier("...")
      - pattern-not: $A.as("...")
    paths:
      include:
        - "src/app/api/v1/marketing/**"
        - "src/lib/marketing/**"
      exclude:
        - "src/lib/marketing/sendgrid/webhook.ts"   # snake_case col map only — verified safe in Phase 20

  # ---- SQL injection class — sql.raw template literal -------------
  # `sql.raw` with a template literal containing a variable bypasses
  # parameter binding. Allowed only for compile-time-constant strings.
  - id: mwg-sql-raw-template-literal
    message: |
      `sql.raw` with a template-literal containing variables is SQL
      injection. Use the parameterized `sql\`\`` tag instead, or a
      precomputed `sql.raw` over a Zod-validated literal at module load.
    severity: ERROR
    languages: [typescript]
    pattern-regex: 'sql\.raw\(`[^`]*\$\{'

  # ---- Constant-time secret compare ---------------------------------
  - id: mwg-non-constant-time-secret-compare
    message: |
      Use `safeStringEqual` from `@/lib/security/constant-time` (or the
      `requireCronAuth` helper for cron) to compare secrets/tokens.
      Native `===` leaks length / matching-prefix timing.
    severity: WARNING
    languages: [typescript]
    patterns:
      - pattern-either:
          - pattern: $A === process.env.CRON_SECRET
          - pattern: process.env.CRON_SECRET === $A
          - pattern: $A === process.env.SENDGRID_WEBHOOK_PUBLIC_KEY
          - pattern: process.env.SENDGRID_WEBHOOK_PUBLIC_KEY === $A
          - pattern: $A === env.CRON_SECRET
          - pattern: env.CRON_SECRET === $A
          - pattern: $A === env.SENDGRID_WEBHOOK_PUBLIC_KEY
          - pattern: env.SENDGRID_WEBHOOK_PUBLIC_KEY === $A

  # ---- Missing postMessage origin check -----------------------------
  - id: mwg-window-message-no-origin-check
    message: |
      `window.addEventListener('message', …)` MUST check
      `event.origin === 'https://editor.unlayer.com'` (or another exact
      allowlisted origin) before trusting the payload. Wildcards are
      not acceptable.
    severity: WARNING
    languages: [typescript]
    patterns:
      - pattern: |
          window.addEventListener('message', $FN)
      - pattern-not-inside: |
          $FN = ($E) => { if ($E.origin === ...) { ... } }
    paths:
      include:
        - "src/app/(app)/marketing/**"
        - "src/components/marketing/**"

  # ---- Forbidden console.log in production code ---------------------
  # Phase 16 STANDARDS forbids console.log; flag any new ones.
  - id: mwg-console-log
    message: |
      `console.log` is forbidden in production code. Use the structured
      `logger` from `@/lib/logger` or an explicit `console.warn` /
      `console.error` with a comment justifying the diagnostic fallback.
    severity: WARNING
    languages: [typescript]
    pattern: console.log(...)
    paths:
      include:
        - "src/**"
      exclude:
        - "src/**/*.test.ts"
        - "src/**/*.test.tsx"

  # ---- UI copy: no internal phase numbering -------------------------
  # Phase 28 — User-facing strings must describe what surfaces DO, not
  # when they were built. "Phase 24," "Phase 21 marketing," etc. are
  # scaffolding terms with no meaning to MWG staff.
  #
  # Regex notes: the negated class excludes `<`, `>`, `{`, `}`, and
  # newlines so TS generics like `Promise<...>`, JSX comments
  # `{/* Phase N — … */}`, and `//` line comments cannot form spurious
  # matches that bridge across unrelated code. We target JSX TEXT
  # NODES, which by construction are single-line and never contain a
  # literal `<`, `>`, `{`, or `}` (those are always tag delimiters or
  # expression-container braces).
  - id: mwg-ui-copy-phase-reference
    languages: [generic]
    paths:
      include:
        - "src/app/**/*.tsx"
        - "src/components/**/*.tsx"
    patterns:
      - pattern-regex: '>[^<>{}\n]*[Pp]hase\s+\d+[^<>{}\n]*<'
    message: |
      User-facing string references internal phase numbering ("Phase N").
      Replace with a functional description of what the surface does.
      See CLAUDE.md → UI copy conventions.
    severity: ERROR

  # ---- UI copy: banned marketing words ------------------------------
  # Phase 28 — Marketing adjectives in platform chrome are forbidden.
  # The marketing surface is excluded because templates surface
  # MWG-marketing-team-authored copy, which legitimately uses these
  # words in customer-facing context.
  #
  # Regex notes: see `mwg-ui-copy-phase-reference` above — the negated
  # class excludes `<`, `>`, `{`, `}`, and newlines so TS generics, JSX
  # comments, and multi-line spans cannot form spurious matches.
  - id: mwg-ui-copy-banned-words
    languages: [generic]
    paths:
      include:
        - "src/app/**/*.tsx"
        - "src/components/**/*.tsx"
      exclude:
        - "src/app/(app)/marketing/**"
        - "src/components/marketing/**"
    patterns:
      - pattern-regex: '>[^<>{}\n]*\b(powerful|seamless|robust|comprehensive|streamline|holistic|effortless|delve|leverage|empower|unlock|transform|revolutionize)\b[^<>{}\n]*<'
    message: |
      User-facing string contains marketing language.
      Replace with a concise functional description.
      See CLAUDE.md → UI copy conventions for the full banned list.
    severity: WARNING

  # ---- Phase references: code comments ------------------------------
  # Phase numbers leak design-history scaffolding into the codebase.
  # Comments must describe WHAT invariants the code guarantees (or WHY
  # a non-obvious choice was made), not when they were wired up.
  # Identifiers, type names, and variable names with phase numbers are
  # still allowed — those are stable internal references.
  #
  # Scope: every executable source file in the repo (src/, scripts/,
  # drizzle/). Excluded paths:
  #   - src/scripts/phase23/** — dev-only fixture script whose
  #     identifiers carry the phase number by convention.
  #   - tools/clickdimensions-migration/** — internal one-shot
  #     migration tool; comments are historical and the tool will be
  #     removed once migration is complete.
  #   - **/CLAUDE.md, **/STANDARDS.md, **/README.md, **/PHASE*-*.md,
  #     .tmp/**, archive/** — historical-context documentation files
  #     where phase references are legitimate references to past work.
  - id: mwg-code-comment-no-phase-reference
    languages: [generic]
    paths:
      include:
        - "src/**/*.tsx"
        - "src/**/*.ts"
        - "scripts/**/*.ts"
        - "scripts/**/*.tsx"
        - "scripts/**/*.mjs"
        - "scripts/**/*.js"
        - "drizzle/**/*.ts"
        - "drizzle/**/*.tsx"
      exclude:
        - "src/scripts/phase23/**"
        - "tools/clickdimensions-migration/**"
        - "**/CLAUDE.md"
        - "**/STANDARDS.md"
        - "**/README.md"
        - "**/PHASE*-*.md"
        - ".tmp/**"
        - "archive/**"
        - "node_modules/**"
        - ".next/**"
    patterns:
      - pattern-either:
          # Line comments
          - pattern-regex: '//[^\n]*[Pp]hase\s+\d+'
          # JSDoc / block-comment body lines (` * ` followed by text)
          - pattern-regex: '^\s*\*[^/\n]*[Pp]hase\s+\d+'
          # Inline /* ... */ block comments on a single line
          - pattern-regex: '/\*[^*\n]*[Pp]hase\s+\d+[^*\n]*\*/'
          # JSX comment opener {/* ... */}
          - pattern-regex: '\{/\*[^*\n]*[Pp]hase\s+\d+'
    message: |
      Source code comment references internal phase numbering. Either
      delete the comment or drop the phase tag and keep the content.
      See CLAUDE.md → Phase references.
    severity: ERROR

  # ---- Phase references: UI strings ---------------------------------
  # Phase 30 — strengthens the Phase 28 JSX-text rule by also catching
  # phase references inside string literals (toast messages, prop
  # values, aria-labels). The original `mwg-ui-copy-phase-reference`
  # rule continues to enforce JSX-text occurrences.
  #
  # Identifiers (variable / type / function names) are exempt because
  # the patterns only match content INSIDE quoted strings or template
  # literals.
  #
  # Excluded paths: src/scripts/phase23/* (internal fixture script
  # whose string literals reference the phase identifier by convention)
  # and lib server-side modules where strings may be log payloads
  # routed through `logger` — those are also forbidden but already
  # caught by mwg-code-comment-no-phase-reference adjacent rules.
  - id: mwg-ui-no-phase-reference
    languages: [generic]
    paths:
      include:
        - "src/app/**/*.tsx"
        - "src/app/**/*.ts"
        - "src/components/**/*.tsx"
        - "src/components/**/*.ts"
        - "src/hooks/**/*.tsx"
        - "src/hooks/**/*.ts"
        - "src/lib/**/*.ts"
        - "scripts/**/*.ts"
        - "scripts/**/*.tsx"
        - "scripts/**/*.mjs"
        - "scripts/**/*.js"
        - "drizzle/**/*.ts"
        - "drizzle/**/*.tsx"
      exclude:
        - "src/scripts/phase23/**"
        - "tools/clickdimensions-migration/**"
        - "**/CLAUDE.md"
        - "**/STANDARDS.md"
        - "**/README.md"
        - "**/PHASE*-*.md"
        - ".tmp/**"
        - "archive/**"
        - "node_modules/**"
        - ".next/**"
    patterns:
      - pattern-either:
          # Double-quoted strings containing Phase N
          - pattern-regex: '"[^"\n]*[Pp]hase\s+\d+[^"\n]*"'
          # Single-quoted strings containing Phase N
          - pattern-regex: "'[^'\\n]*[Pp]hase\\s+\\d+[^'\\n]*'"
          # Template literals containing Phase N
          - pattern-regex: '`[^`\n]*[Pp]hase\s+\d+[^`\n]*`'
    message: |
      User-visible string references internal phase numbering. Replace
      with a functional description of what the surface does. See
      CLAUDE.md → Phase references.
    severity: ERROR
